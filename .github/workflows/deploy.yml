name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Clean install
        run: |
          rm -rf node_modules
          rm -rf dist
          npm ci

      - name: Check for Supabase imports
        run: |
          echo "Checking for Supabase imports in source..."
          grep -r "@supabase/supabase-js" src/ || echo "No Supabase imports found in src"

      - name: Build
        run: npm run build

      - name: Verify build output
        run: |
          echo "=== Build output ==="
          ls -la dist/
          echo "=== index.html content ==="
          cat dist/index.html
          echo "=== Checking built JS for Supabase error ==="
          grep -l "supabaseUrl is required" dist/assets/*.js || echo "No Supabase URL error found in bundle"

      - name: Copy static files
        run: |
          cp public/CNAME dist/CNAME
          cp public/404.html dist/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
