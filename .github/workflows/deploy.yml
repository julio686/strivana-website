name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Clean install
        run: |
          rm -rf node_modules
          rm -rf dist
          npm ci

      - name: Check source for Supabase imports
        run: |
          echo "=== Checking src/lib/supabase.ts ==="
          cat src/lib/supabase.ts | head -20
          echo ""
          echo "=== Searching for @supabase/supabase-js imports ==="
          grep -r "from '@supabase/supabase-js'" src/ || echo "No direct Supabase imports found"

      - name: Build
        run: npm run build

      - name: Verify build output
        run: |
          echo "=== Build output files ==="
          ls -la dist/
          echo ""
          echo "=== index.html content ==="
          cat dist/index.html
          echo ""
          echo "=== Searching for Supabase error in bundle ==="
          if grep -l "supabaseUrl is required" dist/assets/*.js 2>/dev/null; then
            echo "ERROR: Supabase error found in bundle!"
            exit 1
          else
            echo "OK: No Supabase error found in bundle"
          fi

      - name: Copy static files
        run: |
          cp public/CNAME dist/CNAME
          cp public/404.html dist/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
