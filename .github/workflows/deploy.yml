name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Clean install
        run: |
          rm -rf node_modules
          rm -rf dist
          npm ci

      - name: Check source for Supabase imports
        run: |
          echo "=== Checking src/lib/supabase.ts ==="
          cat src/lib/supabase.ts | head -20
          echo ""
          echo "=== Searching for @supabase/supabase-js imports ==="
          grep -r "from '@supabase/supabase-js'" src/ || echo "No direct Supabase imports found"

      - name: Build
        run: npm run build

      - name: Verify build output
        run: |
          echo "=== Build output files ==="
          ls -la dist/
          echo ""
          echo "=== index.html content ==="
          cat dist/index.html
          echo ""
          echo "=== Searching for Supabase error in bundle ==="
          if grep -l "supabaseUrl is required" dist/assets/*.js 2>/dev/null; then
            echo "ERROR: Supabase error found in bundle!"
            exit 1
          else
            echo "OK: No Supabase error found in bundle"
          fi

      - name: Copy static files
        run: |
          cp public/CNAME dist/CNAME
          cp public/404.html dist/404.html

      - name: Commit and push dist folder
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add dist/ -f
          git commit -m "Update dist folder - $(date -u +%Y-%m-%d-%H:%M)" || echo "No changes to commit"
          git push origin main
